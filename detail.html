<!DOCTYPE html>
<html lang=zh>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>{{TITLE}} — MediaShelf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;padding:20px;max-width:960px;margin:auto}
a{color:#58a6ff;text-decoration:none}
a:hover{text-decoration:underline}
.back{margin-bottom:16px;display:inline-block;font-size:14px}
.header{display:flex;gap:20px;margin-bottom:20px;flex-wrap:wrap}
.poster{width:200px;flex-shrink:0}
.poster img{width:100%;border-radius:8px;display:block;background:#0d1117}
.meta{flex:1;min-width:200px}
.meta h2{font-size:22px;margin-bottom:8px;color:#f0f6fc}
.meta .number{color:#8b949e;font-size:13px;margin-bottom:4px}
.meta .score{color:#e6c300;font-size:18px;margin-bottom:8px}
.meta .summary{font-size:13px;line-height:1.6;color:#c9d1d9;margin-bottom:12px}
.tag{display:inline-block;background:#1f3a5f;color:#58a6ff;border-radius:4px;padding:2px 8px;font-size:11px;margin:2px}
.source-tag{background:#21262d;color:#8b949e}
.video-section{margin-bottom:20px}
.video-section select{width:100%;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:8px 10px;color:#c9d1d9;font-size:13px;margin-bottom:8px}
.video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:8px;overflow:hidden}
.video-wrap video{width:100%;height:100%;display:block}
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:16px}
.preview-grid img{width:100%;border-radius:4px;display:block;background:#0d1117}
.reviews{margin-top:20px}
.review{border:1px solid #30363d;border-radius:6px;padding:12px;margin-bottom:8px;font-size:13px}
.review .author{color:#8b949e;font-size:12px;margin-bottom:4px}
.review .content{line-height:1.6}
h3{font-size:16px;margin-bottom:12px;color:#f0f6fc;margin-top:20px}
#back-to-top{position:fixed;bottom:16px;right:16px;width:44px;height:44px;border-radius:50%;background:#30363d;color:#c9d1d9;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s,transform .15s;box-shadow:0 2px 12px rgba(0,0,0,.4);user-select:none}
#back-to-top.show{opacity:1;pointer-events:auto}
#back-to-top:hover{background:#484f58;transform:scale(1.1)}
</style>
<div class=header>
<div class=poster id=poster></div>
<div class=meta id=meta></div>
</div>
<div class=video-section id=video-section></div>
<div id=previews></div>
<div id=reviews></div>
<div id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</div>
<script>
const ID=new URLSearchParams(window.location.search).get('id');
let _info=null,_sources=[],_player=null;
const COVER='images/'+ID+'/cover.jpg';
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showCover(el){el.innerHTML='<div style="text-align:center;padding:20px"><img src="'+COVER+'" style="max-width:100%;max-height:70vh;border-radius:8px"></div>'}
fetch('data/'+ID+'/info.json').then(function(r){return r.json()}).then(function(info){
    _info=info;
    document.title=info.title+' — MediaShelf';
    var poster=document.getElementById('poster');
    poster.innerHTML='<img src="'+COVER+'" onerror="this.style.display=\'none\'">';
    var meta=document.getElementById('meta');
    var html='<h2>'+esc(info.title)+'</h2>';
    if(info.number&&info.number!==info.title) html+='<div class=number>'+esc(info.number)+'</div>';
    html+='<div class=score>'+(info.score||'')+'</div>';
    if(info.summary) html+='<div class=summary>'+esc(info.summary)+'</div>';
    html+='<div>'+(info.tags||[]).map(function(t){return '<span class=tag>'+esc(t.name||t)+'</span>'}).join('')+'</div>';
    html+='<div><span class="tag source-tag">'+esc(info.source||'')+'</span></div>';
    meta.innerHTML=html;
    var sources=(info.video||{}).sources||[];
    _sources=sources;
    if(sources.length){
        var vs=document.getElementById('video-section');
        var sel='';
        if(sources.length>1) sel=sources.map(function(s,i){return '<option value='+i+'>'+esc(s.label)+'</option>'}).join('');
        vs.innerHTML='<div id=player-wrap class=video-wrap></div>';
        if(sel) vs.innerHTML='<select onchange="switchSource(this.value)">'+sel+'</select>'+vs.innerHTML;
        initPlayer();
    }
    var pdiv=document.getElementById('previews');
    var pi=info.preview_images||[];
    if(pi.length){
        pdiv.innerHTML='<h3>预览图</h3><div class=preview-grid>'+pi.slice(0,20).map(function(p){return '<img src="'+esc(p.large_url||p.thumb_url||p)+'" loading="lazy">'}).join('')+'</div>';
    }else{
        var phtml='';
        for(var i=0;i<(sources.length||1);i++){
            (function(idx){
                var img=new Image();
                img.onload=function(){pdiv.innerHTML='<h3>预览图</h3><div class=preview-grid id=p-grid></div>';document.getElementById('p-grid').appendChild(img)};
                img.src='images/'+ID+'/previews/'+String(idx).padStart(4,'0')+'.jpg';
            })(i);
        }
    }
    fetch('data/'+ID+'/reviews.json').then(function(r){return r.json()}).then(function(revs){
        if(revs&&revs.length){
            var rh='<h3>评论 ('+revs.length+')</h3>';
            revs.forEach(function(r){
                var score=r.score?'<span style="color:#d29922;font-weight:bold">'+esc(String(r.score))+'★</span> ':'';
                var likes=r.likes_count?' 👍'+r.likes_count:'';
                var time=r.created_at?' · '+esc(r.created_at):'';
                rh+='<div class=review><div class=author>'+score+esc(r.username||'匿名')+likes+time+'</div><div class=content>'+esc(r.content||'')+'</div></div>';
            });
            document.getElementById('reviews').innerHTML=rh;
        }
    });
});
var btt=document.getElementById('back-to-top');
window.addEventListener('scroll',function(){btt.classList.toggle('show',window.scrollY>200)});
function initPlayer(){
    var wrap=document.getElementById('player-wrap');
    showCover(wrap);
    if(typeof Hls==='undefined'){setTimeout(initPlayer,200);return}
    switchSource(0);
}
function switchSource(i){
    i=parseInt(i)||0;
    var s=_sources[i];
    if(!s)return;
    var wrap=document.getElementById('player-wrap');
    if(s.type==='local'){
        wrap.innerHTML='<p style="color:#8b949e;padding:40px;text-align:center">本地文件，不可在线播放</p>';
        return;
    }
    var src=s.src;
    if(src.endsWith('.m3u8')&&Hls.isSupported()){
        wrap.innerHTML='<video id=player controls playsinline style="width:100%;height:100%"></video>';
        var v=document.getElementById('player');
        var h=new Hls();
        h.loadSource(src);
        h.attachMedia(v);
    }else{
        wrap.innerHTML='<video id=player controls playsinline style="width:100%;height:100%" poster="'+COVER+'"><source src="'+esc(src)+'"></video>';
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</html>
